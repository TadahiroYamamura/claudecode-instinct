name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/instinct-cli/go.mod

      - name: Install ICU (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install icu4c
          ICU_PREFIX=$(brew --prefix icu4c)
          echo "CGO_CPPFLAGS=-I${ICU_PREFIX}/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L${ICU_PREFIX}/lib" >> $GITHUB_ENV

      - name: Build
        working-directory: cmd/instinct-cli
        run: go build -o instinct-${{ matrix.goos }}-${{ matrix.goarch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: instinct-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cmd/instinct-cli/instinct-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
